<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Simply Sprinklers Long Island</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-page">
    <main class="login-main">
      <section class="login-card" aria-labelledby="login-title">
        <h1 id="login-title">Admin Login</h1>
        <p>Sign in to edit the homepage message stored in Firestore.</p>

        <form id="login-form" class="login-form">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email" />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            required
            autocomplete="current-password"
          />

          <button type="submit">Sign In</button>
          <p id="login-status" class="login-status" aria-live="polite"></p>
        </form>

        <a class="login-back-link" href="index.html">Back to homepage</a>
      </section>
    </main>

    <script type="module" src="login.js"></script>
  </body>
</html>
